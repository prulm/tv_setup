<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; overflow: hidden; }
        .header { background: #1e293b; padding: 20px; font-size: 42px; text-align: center; font-weight: bold; border-bottom: 4px solid #334155; }
        #content { padding: 10px; height: 85vh; display: flex; flex-direction: column; }
        
        /* Podcast Overlay Style */
        #podcast-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #1e1b4b;
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #podcast-frame {
            width: 80%;
            height: 60%;
            border: 5px solid #4f46e5;
            border-radius: 15px;
            background: white;
        }

        .btn-manual {
            margin-top: 20px; padding: 20px 40px; font-size: 30px;
            background: #10b981; color: white; border: none; border-radius: 10px; cursor: pointer;
        }

        #scroll-container { width: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; table-layout: fixed; }
        th { background: #334155; padding: 15px; font-size: 45px; border: 2px solid #475569; }
        td { padding: 20px; text-align: center; border: 2px solid #475569; font-size: 55px; }
        .gate-0 { background: #059669; } .gate-4 { background: #dc2626; }
    </style>
</head>
<body>

<div id="podcast-overlay">
    <h1>🎙️ PODCAST TIME ACTIVE</h1>
    <p>Pierre Clary: An Amazing Story</p>
    <div id="frame-slot"></div>
    <button class="btn-manual" onclick="startPodcast(true)">If audio doesn't start, Click Here</button>
</div>

<div id="displaySection">
    <div class="header"><span id="title">Loading Dashboard...</span></div>
    <div id="content"><div id="scroll-container"></div></div>
</div>

<script>
/* --- CONFIGURATION --- */
const FILE_NAME = "assignments.xlsx"; 
const PODCAST_URL = "https://www.safran-group.com/podcasts/amazing-story-pierre-clary-2023-12-20";

/* --- TEST SETTINGS --- */
const START_HOUR = 8;  // Changed to 8 for your test
const START_MIN = 30;
const END_HOUR = 10;
const END_MIN = 0;

let currentDisplay = 0;
let rotationTimeout;
let scrollInterval;
let isPodcastMode = false;

window.onload = loadExcel;

function checkPodcastSchedule() {
    const now = new Date();
    const currentTime = now.getHours() * 60 + now.getMinutes();
    const startTime = START_HOUR * 60 + START_MIN;
    const endTime = END_HOUR * 60 + END_MIN;
    
    return (currentTime >= startTime && currentTime < endTime);
}

function startPodcast(manual = false) {
    isPodcastMode = true;
    document.getElementById('podcast-overlay').style.display = 'flex';
    document.getElementById('displaySection').style.display = 'none';
    
    // Inject frame
    const slot = document.getElementById('frame-slot');
    if (slot.innerHTML === "" || manual) {
        slot.innerHTML = `<iframe id="podcast-frame" src="${PODCAST_URL}" allow="autoplay"></iframe>`;
    }

    // Check every 30s to see if we should go back to the dashboard
    const checkEnd = setInterval(() => {
        if (!checkPodcastSchedule()) {
            clearInterval(checkEnd);
            stopPodcast();
        }
    }, 30000);
}

function stopPodcast() {
    isPodcastMode = false;
    document.getElementById('podcast-overlay').style.display = 'none';
    document.getElementById('displaySection').style.display = 'block';
    document.getElementById('frame-slot').innerHTML = '';
    loadExcel();
}

async function loadExcel() {
    // Check schedule BEFORE rotation starts
    if (checkPodcastSchedule()) {
        startPodcast();
        return; 
    }

    try {
        const response = await fetch(`${FILE_NAME}?t=${new Date().getTime()}`);
        const data = await response.arrayBuffer();
        const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });
        
        // Simulating the buildDisplayList and startRotation from your original code
        // For brevity, I am assuming your build/show logic is the same
        buildDisplayList(workbook); 
        startRotation();
    } catch (err) {
        document.getElementById("title").innerText = "File Error...";
        setTimeout(loadExcel, 10000);
    }
}

// ... Keep your existing buildDisplayList, showSheet, and startRotation functions here ...
// Just make sure nextSlide calls loadExcel() at the end of the loop:

function nextSlide() {
    // (Clearing logic here)
    let nextIndex = currentDisplay + 1;
    if (nextIndex >= displays.length) {
        loadExcel(); // This triggers the pre-rotation check
    } else {
        currentDisplay = nextIndex;
        startRotation();
    }
}
</script>
</body>
</html>
